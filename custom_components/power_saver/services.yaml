set_schedule_hours:
  name: Set schedule hours
  description: >-
    Override the number of hours to activate per period (Lowest Price) or
    minimum hours on (Minimum Runtime). The schedule is recomputed immediately
    with the new value. The override persists across restarts until cleared.
  fields:
    device_id:
      name: Device
      description: The Power Saver device to configure.
      required: true
      selector:
        device:
          integration: power_saver
    hours:
      name: Hours
      description: >-
        Number of hours to activate (0–24). Accepts quarter-hour precision
        (e.g., 4.25 for 4 h 15 min).
      required: true
      selector:
        number:
          min: 0
          max: 24
          step: 0.25
          unit_of_measurement: h
          mode: box

clear_schedule_hours_override:
  name: Clear schedule hours override
  description: >-
    Remove a previously set hours override and revert to the value configured
    in the integration options. The schedule is recomputed immediately.
  fields:
    device_id:
      name: Device
      description: The Power Saver device to configure.
      required: true
      selector:
        device:
          integration: power_saver

set_exclude_times:
  name: Set exclude times
  description: >-
    Override the excluded time range. Slots during this period are never
    activated. The schedule is recomputed immediately with the new range. The
    override persists across restarts until cleared.
  fields:
    device_id:
      name: Device
      description: The Power Saver device to configure.
      required: true
      selector:
        device:
          integration: power_saver
    exclude_from:
      name: Exclude from
      description: >-
        Start of the excluded time range. Supports HH:MM and HH:MM:SS.
      required: true
      selector:
        time:
    exclude_until:
      name: Exclude until
      description: >-
        End of the excluded time range. Supports HH:MM and HH:MM:SS.
      required: true
      selector:
        time:

clear_exclude_times_override:
  name: Clear exclude times override
  description: >-
    Remove a previously set exclude times override and revert to the excluded
    time range configured in the integration options. The schedule is
    recomputed immediately.
  fields:
    device_id:
      name: Device
      description: The Power Saver device to configure.
      required: true
      selector:
        device:
          integration: power_saver
